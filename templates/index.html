<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Phân Tích Cảm Xúc (Sentiment Analysis)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="text-center mb-4">
                <h2 class="fw-bold text-primary"><i class="fas fa-brain me-2"></i>Sentiment Analysis Benchmark</h2>
                <p class="text-muted">Đánh giá đa mô hình Deep Learning trên cùng một đoạn văn bản</p>
            </div>

            <div class="card shadow-sm border-0 mb-4 rounded-4">
                <div class="card-body p-4">
                    <label for="textInput" class="form-label fw-bold">Nhập bình luận / Đánh giá của bạn:</label>
                    <textarea class="form-control mb-3 custom-textarea" id="textInput" rows="3" placeholder="Ví dụ: Bài nhạc này quá hay, tôi thích nó <3"></textarea>
                    
                    <button id="predictBtn" class="btn btn-primary w-100 fw-bold py-2 rounded-3">
                        <i class="fas fa-magic me-2"></i> Phân Tích Ngay
                    </button>
                </div>
            </div>

            <div id="errorAlert" class="alert alert-danger d-none" role="alert"></div>

            <div id="loadingBox" class="text-center d-none py-4">
                <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status"></div>
                <h5 class="mt-3 text-muted">Các mô hình đang phân tích...</h5>
            </div>

            <div id="resultBox" class="card shadow-sm border-0 d-none rounded-4">
                <div class="card-header bg-white border-bottom-0 pt-4 pb-0">
                    <h5 class="fw-bold"><i class="fas fa-poll me-2 text-success"></i>Bảng So Sánh Kết Quả</h5>
                    <p class="text-muted small mb-0">Văn bản tiền xử lý: <i id="cleanTextDisplay"></i></p>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>Tên Mô Hình</th>
                                    <th>Phân Loại</th>
                                    <th>Độ Tự Tin</th>
                                    <th>Tốc độ (ms)</th>
                                </tr>
                            </thead>
                            <tbody id="resultTableBody">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
